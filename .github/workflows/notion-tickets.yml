name: Create Notion Tickets from Commits

on:
  push:
    branches: [ main, master, pipeline ]
  workflow_dispatch:

jobs:
  create-notion-tickets:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Get changed files and commits
      id: changes
      run: |
        # Get commits since last push (avoid duplicates)
        if [ "${{ github.event_name }}" == "push" ]; then
          # Use commit range: from before commit to current
          if [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            COMMITS=$(git log ${{ github.event.before }}..${{ github.sha }} --pretty=format:"%H|%s|%an|%ae" --no-merges)
          else
            # First push to branch, get only the head commit
            COMMITS=$(git log -1 --pretty=format:"%H|%s|%an|%ae" --no-merges)
          fi
        else
          # For workflow dispatch, get last 24 hours
          COMMITS=$(git log --since="24 hours ago" --pretty=format:"%H|%s|%an|%ae" --no-merges)
        fi
        
        echo "commits<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
    - name: Create Notion tickets
      run: |
        # Function to analyze commit with DeepSeek AI
        analyze_commit() {
          local commit_hash="$1"
          local commit_message="$2"
          
          # Get changed files for this commit
          local changed_files=$(git diff-tree --no-commit-id --name-only -r "$commit_hash" 2>/dev/null | head -20 | tr '\n' ', ')
          
          # Escape for JSON
          local escaped_message=$(echo "$commit_message" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | sed 's/\t/\\t/g' | tr '\n' ' ')
          local escaped_files=$(echo "$changed_files" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g')
          
          # Call DeepSeek API
          local ai_response=$(curl -s -X POST "https://api.deepseek.com/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.DEEPSEEK_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "deepseek-chat",
              "messages": [
                {
                  "role": "system",
                  "content": "You analyze git commits and generate Notion ticket data. Return ONLY valid JSON with no markdown. Each response has: title (clear task description, max 80 chars), description (detailed explanation), priority (High/Medium/Low), stack (Backend/Web Editor/Mobile App/Dashboard), estimated_hours (1-8)."
                },
                {
                  "role": "user",
                  "content": "Commit: '"$escaped_message"'\nChanged files: '"$escaped_files"'\n\nGenerate ticket as JSON: {\"title\": \"\", \"description\": \"\", \"priority\": \"\", \"stack\": \"\", \"estimated_hours\": 0}"
                }
              ],
              "temperature": 0.3,
              "max_tokens": 500
            }')
          
          # Extract content from DeepSeek response
          local content=$(echo "$ai_response" | jq -r '.choices[0].message.content // empty' 2>/dev/null)
          
          if [ -n "$content" ] && echo "$content" | jq -e '.title' >/dev/null 2>&1; then
            echo "$content"
          else
            # Fallback if AI fails
            local clean_title=$(echo "$commit_message" | sed -E 's/^(feat|fix|docs|style|refactor|test|chore)[\(\)a-zA-Z]*\s*[:\-]\s*//' | cut -c1-80)
            echo '{"title":"'"$clean_title"'","description":"Commit: '"$escaped_message"'","priority":"Medium","stack":"Backend","estimated_hours":2}'
          fi
        }
        
        # Function to create Notion page via curl
        create_notion_page() {
          local commit_hash="$1"
          local commit_message="$2"
          local author_name="$3"
          local author_email="$4"
          
          # Get AI analysis
          echo "DEBUG: Getting AI analysis for commit $commit_hash"
          ai_analysis=$(analyze_commit "$commit_hash" "$commit_message")
          echo "DEBUG: AI analysis result: $ai_analysis"
          
          # Parse AI response (fallback to defaults if AI fails)
          echo "DEBUG: Attempting to parse AI response"
          if echo "$ai_analysis" | jq -e '.title' >/dev/null 2>&1; then
            echo "DEBUG: AI response is valid JSON"
            clean_title=$(echo "$ai_analysis" | jq -r '.title' | cut -c1-80 | sed 's/"/\\"/g')
            description=$(echo "$ai_analysis" | jq -r '.description' | sed 's/"/\\"/g')
            priority=$(echo "$ai_analysis" | jq -r '.priority' | sed 's/"/\\"/g')
            stack=$(echo "$ai_analysis" | jq -r '.stack' | sed 's/"/\\"/g')
            estimated_hours=$(echo "$ai_analysis" | jq -r '.estimated_hours')
          else
            echo "DEBUG: AI response is not valid JSON, using fallback"
            # Fallback to original logic
            clean_title=$(echo "$commit_message" | sed -E 's/^(feat|fix|docs|style|refactor|test|chore)[\(\)]*\s*[:\-]\s*//' | sed -E 's/^\w+[\(\)]*\s*[:\-]\s*//' | sed 's/.*/\U&/' | sed 's/./\L&/' | cut -c1-80 | sed 's/"/\\"/g')
            description="Commit: $commit_message"
            priority="Medium"
            stack="Backend"
            estimated_hours="4"
          fi
          
          # Validate priority
          if [[ "$priority" != "High" && "$priority" != "Medium" && "$priority" != "Low" ]]; then
            priority="Medium"
          fi
          
          # Validate stack
          if [[ "$stack" != "Backend" && "$stack" != "Web Editor" && "$stack" != "Mobile App" && "$stack" != "Dashboard" ]]; then
            stack="Backend"
          fi
          
          # Default to Ali's user ID
          user_id="18ed872b-594c-81c7-85d8-00024f4f0dab"
          
          # Check if page already exists
          search_response=$(curl -s -X POST "https://api.notion.com/v1/search" \
            -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d "{\"query\": \"${commit_hash:0:8}\"}")
          
          result_count=$(echo "$search_response" | jq -r '.results | length')
          if [ "$result_count" -gt 0 ] 2>/dev/null; then
            echo "⏭️  Page for commit ${commit_hash:0:8} already exists, skipping..."
            return 0
          fi
          
          # Create page with AI-enhanced data
          # Escape variables to prevent shell interpretation
          safe_title=$(echo "$clean_title" | sed 's/"/\\"/g')
          safe_priority=$(echo "$priority" | sed 's/"/\\"/g')
          safe_stack=$(echo "$stack" | sed 's/"/\\"/g')
          safe_user_id=$(echo "$user_id" | sed 's/"/\\"/g')
          
          # Debug: Show what we're working with
          echo "DEBUG: clean_title=$clean_title"
          echo "DEBUG: priority=$priority"
          echo "DEBUG: stack=$stack"
          echo "DEBUG: safe_title=$safe_title"
          echo "DEBUG: safe_priority=$safe_priority"
          echo "DEBUG: safe_stack=$safe_stack"
          
          page_data='{"parent": {"database_id": "2cfac610-a640-8002-9365-d99a2c917326"}, "properties": {"Project name": {"title": [{"text": {"content": "'"$safe_title"'"}}]}, "Status": {"status": {"name": "In progress"}}, "Priority": {"select": {"name": "'"$safe_priority"'"}}, "Stack": {"select": {"name": "'"$safe_stack"'"}}, "Start date": {"date": {"start": "'$(date +%Y-%m-%d)'"}}, "Assignee": {"people": [{"id": "'"$safe_user_id"'"}]}}}'
          
          response=$(curl -s -X POST "https://api.notion.com/v1/pages" \
            -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d "$page_data")
          
          if echo "$response" | grep -q '"object":"page"'; then
            url=$(echo "$response" | grep -o '"url":"[^"]*' | cut -d'"' -f4)
            echo "✅ Created AI-enhanced ticket: $clean_title"
            echo "   Priority: $priority | Stack: $stack | Hours: $estimated_hours"
            echo "   $url"
            return 0
          else
            echo "❌ Failed to create ticket: $response"
            return 1
          fi
        }
        
        # Process commits - use heredoc with quoted delimiter to prevent ALL shell interpretation
        cat << 'COMMITS_EOF' > /tmp/commits.txt
        ${{ steps.changes.outputs.commits }}
        COMMITS_EOF
        created_tickets=0
        
        while IFS='|' read -r commit_hash commit_message author_name author_email; do
          if [ -n "$commit_hash" ]; then
            # Escape commit message to prevent shell interpretation
            safe_commit_message=$(echo "$commit_message" | sed 's/"/\\"/g' | sed 's/`/\\`/g' | sed 's/\$/\\$/g')
            if create_notion_page "$commit_hash" "$safe_commit_message" "$author_name" "$author_email"; then
              created_tickets=$((created_tickets + 1))
            fi
          fi
        done < /tmp/commits.txt
        
        echo ""
        echo "🎉 Created $created_tickets tickets in Notion!"
        
    - name: Summary
      run: |
        echo "🎯 Notion ticket creation completed!"
        echo "📝 Check your Mel database for new tickets"
