name: Create Notion Tickets from Commits

on:
  push:
    branches: [ main, master, pipeline ]
  workflow_dispatch:

jobs:
  create-notion-tickets:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Get changed files and commits
      id: changes
      run: |
        # Get commits since last push (avoid duplicates)
        if [ "${{ github.event_name }}" == "push" ]; then
          COMMITS=$(git log --since="${{ github.event.before }}" --pretty=format:"%H|%s|%an|%ae" --no-merges)
        else
          # For workflow dispatch, get last 24 hours
          COMMITS=$(git log --since="24 hours ago" --pretty=format:"%H|%s|%an|%ae" --no-merges)
        fi
        
        echo "commits<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
    - name: Create Notion tickets
      run: |
        # Function to analyze commit with AI
        analyze_commit() {
          local commit_hash="$1"
          local commit_message="$2"
          
          # Temporarily disable AI to debug shell interpretation issues
          echo '{"title":"'"$commit_message"'","description":"AI disabled for debugging","priority":"Medium","stack":"Backend","estimated_hours":4}'
        }
        
        # Function to create Notion page via curl
        create_notion_page() {
          local commit_hash="$1"
          local commit_message="$2"
          local author_name="$3"
          local author_email="$4"
          
          # Get AI analysis
          ai_analysis=$(analyze_commit "$commit_hash" "$commit_message")
          
          # Parse AI response (fallback to defaults if AI fails)
          if echo "$ai_analysis" | jq -e '.title' >/dev/null 2>&1; then
            clean_title=$(echo "$ai_analysis" | jq -r '.title' | cut -c1-80)
            description=$(echo "$ai_analysis" | jq -r '.description')
            priority=$(echo "$ai_analysis" | jq -r '.priority')
            stack=$(echo "$ai_analysis" | jq -r '.stack')
            estimated_hours=$(echo "$ai_analysis" | jq -r '.estimated_hours')
          else
            # Fallback to original logic
            clean_title=$(echo "$commit_message" | sed -E 's/^(feat|fix|docs|style|refactor|test|chore)[\(\)]*\s*[:\-]\s*//' | sed -E 's/^\w+[\(\)]*\s*[:\-]\s*//' | sed 's/.*/\U&/' | sed 's/./\L&/' | cut -c1-80)
            description="Commit: $commit_message"
            priority="Medium"
            stack="Backend"
            estimated_hours="4"
          fi
          
          # Validate priority
          if [[ "$priority" != "High" && "$priority" != "Medium" && "$priority" != "Low" ]]; then
            priority="Medium"
          fi
          
          # Validate stack
          if [[ "$stack" != "Backend" && "$stack" != "Web Editor" && "$stack" != "Mobile App" && "$stack" != "Dashboard" ]]; then
            stack="Backend"
          fi
          
          # Default to Ali's user ID
          user_id="18ed872b-594c-81c7-85d8-00024f4f0dab"
          
          # Check if page already exists
          search_response=$(curl -s -X POST "https://api.notion.com/v1/search" \
            -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d "{\"query\": \"${commit_hash:0:8}\"}")
          
          if echo "$search_response" | grep -q '"results"'; then
            echo "⏭️  Page for commit ${commit_hash:0:8} already exists, skipping..."
            return 0
          fi
          
          # Create page with AI-enhanced data
          page_data='{"parent": {"database_id": "2cfac610-a640-8002-9365-d99a2c917326"}, "properties": {"Project name": {"title": [{"text": {"content": "'"$clean_title"'"}}]}, "Status": {"status": {"name": "In progress"}}, "Priority": {"select": {"name": "'"$priority"'"}}, "Stack": {"select": {"name": "'"$stack"'"}}, "Start date": {"date": {"start": "'$(date +%Y-%m-%d)'"}}, "Assignee": {"people": [{"id": "'"$user_id"'"}]}}}'
          
          response=$(curl -s -X POST "https://api.notion.com/v1/pages" \
            -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d "$page_data")
          
          if echo "$response" | grep -q '"object":"page"'; then
            url=$(echo "$response" | grep -o '"url":"[^"]*' | cut -d'"' -f4)
            echo "✅ Created AI-enhanced ticket: $clean_title"
            echo "   Priority: $priority | Stack: $stack | Hours: $estimated_hours"
            echo "   $url"
            return 0
          else
            echo "❌ Failed to create ticket: $response"
            return 1
          fi
        }
        
        # Process commits
        created_tickets=0
        
        while IFS='|' read -r commit_hash commit_message author_name author_email; do
          if [ -n "$commit_hash" ]; then
            if create_notion_page "$commit_hash" "$commit_message" "$author_name" "$author_email"; then
              ((created_tickets++))
            fi
          fi
        done <<< "${{ steps.changes.outputs.commits }}"
        
        echo ""
        echo "🎉 Created $created_tickets tickets in Notion!"
        
    - name: Summary
      run: |
        echo "🎯 Notion ticket creation completed!"
        echo "📝 Check your Mel database for new tickets"
